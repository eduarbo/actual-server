# fly.toml app configuration file generated for eduarbo-actual-server on 2026-03-17T10:34:32-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'eduarbo-actual-server'
primary_region = 'dfw'

[build]
  image = 'actualbudget/actual-server:latest'

[env]
  PORT = '5006'

[[mounts]]
  source = 'actual_data'
  destination = '/data'

[http_service]
  internal_port = 5006
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 40

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
